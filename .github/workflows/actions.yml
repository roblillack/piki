on: push
name: Build, Lint, and Test

jobs:
  clippy:
    name: Run Clippy Lints
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install FLTK dependencies
        run: sudo apt update && sudo apt install -y libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev libwayland-dev libxkbcommon-dev libdbus-1-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Clippy
        run: rustup component add clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install FLTK dependencies
        run: sudo apt update && sudo apt install -y libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev libwayland-dev libxkbcommon-dev libdbus-1-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Tests
        run: cargo test --all-targets --all-features

  build:
    name: Build ${{ matrix.platform.name }} (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux x64
          - name: Linux
            runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            deps: sudo apt update && sudo apt install -y libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev libwayland-dev libxkbcommon-dev libdbus-1-dev
            artifact_name: piki-gui-linux-x86_64

          # Linux ARM64
          - name: Linux
            runner: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            deps: sudo apt update && sudo apt install -y libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev libwayland-dev libxkbcommon-dev libdbus-1-dev
            artifact_name: piki-gui-linux-aarch64

          # macOS x64 (Intel)
          - name: macOS
            runner: macos-15-intel
            arch: x86_64
            target: x86_64-apple-darwin
            deps: echo "No additional dependencies needed for macOS"
            artifact_name: piki-gui-macos-x86_64

          # macOS ARM64 (Apple Silicon)
          - name: macOS
            runner: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
            deps: echo "No additional dependencies needed for macOS"
            artifact_name: piki-gui-macos-aarch64

          # Windows x64
          - name: Windows
            runner: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            deps: echo "No additional dependencies needed for Windows"
            artifact_name: piki-gui-windows-x86_64.exe

          # Windows ARM64
          - name: Windows
            runner: windows-latest
            arch: aarch64
            target: aarch64-pc-windows-msvc
            deps: echo "No additional dependencies needed for Windows"
            artifact_name: piki-gui-windows-aarch64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install platform dependencies
        run: ${{ matrix.platform.deps }}

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: ${{ matrix.platform.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.platform.target }}/release/piki-gui artifacts/${{ matrix.platform.artifact_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          cp target/${{ matrix.platform.target }}/release/piki-gui.exe artifacts/${{ matrix.platform.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: artifacts/${{ matrix.platform.artifact_name }}
          if-no-files-found: error

      - name: Bundle macOS .app
        if: matrix.platform.name == 'macOS'
        run: |
          bash gui/scripts/bundle-macos.sh \
            target/${{ matrix.platform.target }}/release/piki-gui \
            target/macos
          ditto -c -k --keepParent target/macos/Piki.app \
            artifacts/Piki-macos-${{ matrix.platform.arch }}.app.zip

      - name: Upload macOS .app
        if: matrix.platform.name == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Piki-macos-${{ matrix.platform.arch }}-app
          path: artifacts/Piki-macos-${{ matrix.platform.arch }}.app.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [clippy, tests, build]
    permissions:
      contents: write
    # `cargo release` bumps all three crates, rolls CHANGELOG.md, publishes to
    # crates.io, and pushes a single `vX.Y.Z` tag — that tag push fires this job.
    # Gated behind lint/tests/build so a release always carries a full, tested
    # set of binaries.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Pull every binary the build matrix produced (6 platform binaries + 2
      # macOS .app zips) into one flat directory to attach to the release.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Strips the tag's `v` prefix, pulls the matching `## [X.Y.Z]` section out
      # of CHANGELOG.md (via parse-changelog) and posts it as the release body.
      - name: Create GitHub release with changelog notes
        uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          title: "Piki $version"
          token: ${{ secrets.GITHUB_TOKEN }}

      # create-gh-release-action writes the notes but cannot attach files, so
      # upload the prebuilt binaries to the release it just created.
      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" artifacts/* --clobber
